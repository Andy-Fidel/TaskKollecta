<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#09090b" />
    <title>Offline – TaskKollecta</title>
    <style>
      * { box-sizing: border-box; }
      body {
        align-items: center;
        background: radial-gradient(circle at top, #312e81 0, #09090b 42%);
        color: #fafafa;
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        justify-content: center;
        margin: 0;
        min-height: 100vh;
        padding: 24px;
        text-align: center;
      }
      main { max-width: 430px; }
      img { height: 88px; width: 88px; }
      h1 { font-size: 1.75rem; margin: 20px 0 8px; }
      p { color: #a1a1aa; line-height: 1.6; margin: 0 0 24px; }
      button {
        background: #4f46e5;
        border: 0;
        border-radius: 10px;
        color: white;
        cursor: pointer;
        font: inherit;
        font-weight: 600;
        padding: 11px 18px;
      }
      button:hover { background: #4338ca; }
    </style>
  </head>
  <body>
    <main>
      <img src="/android-chrome-192x192.png" alt="" />
      <h1>You’re offline</h1>
      <p>TaskKollecta can reopen pages you have already visited. Reconnect to sync tasks and load fresh workspace data.</p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
